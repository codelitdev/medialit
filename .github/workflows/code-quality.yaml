name: Code Quality
on:
  push:
    branches:
      - '**'

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  CI: true

jobs:
  lint-format-test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure CI Git User
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'hi@codelit.dev'
          git remote set-url origin https://$GITHUB_ACTOR:$GITHUB_PAT@github.com/codelitdev/medialit
        env:
          GITHUB_PAT: ${{ secrets.PAT }}

      - name: Checkout and pull branch
        run: git checkout "${GITHUB_REF:11}" && git pull

      - name: Install pnpm 
        run: |
          npm i pnpm@10.7.1 -g

      - name: Install dependencies
        run: pnpm install 

      - name: Run lint 
        run: pnpm lint 
      
      - name: Run prettier 
        run: pnpm prettier 

      - name: Build dependencies
        run: |
          NODE_OPTIONS="--max-old-space-size=8192" pnpm -r build

      - name: Run test
        run: pnpm test
